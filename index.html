<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVOLAND - Home Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #ffffff; /* pure white */
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;

      /* Gradient background */
      background: linear-gradient(180deg, #56721D, #224e10);

      /* Softer shadow */
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    
    .navbar .links a:hover {
      text-decoration: underline;
      color: rgb(223, 227, 222);
    }

    /* Hero Section */
    .hero {
      text-align: center;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      color: rgb(86, 114, 29);

      /* Background image */
      background-image: url('lavo_pic_1.jpeg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      background-color: #ffffff;

      padding-bottom: 390px;
    }

    /* Overlay for readability */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
    }

    .hero h1 {
      font-size: 42px;
      margin: 0;
      position: relative; /* ensures text sits above overlay */
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 24px;
      }
      .hero {
        padding-bottom: 80px; /* less space on tablets */
      }
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 26px;
      }
      .hero {
        padding-bottom: 60px; /* less space on phones */
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">LAVOLAND</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="LAVO_Contacts.html">Contacts</a>
    </div>
  </nav>
  
  <section class="hero">
    <h1><strong>Love of Avocados</strong></h1>
  </section>
</body>
</html>
