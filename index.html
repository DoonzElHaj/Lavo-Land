<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lavo Land - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #ffffff; /* pure white */
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(67, 134, 43);
      padding: 15px 30px;
    }

    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;   /* anchor content near bottom */
      align-items: center;
      color: rgb(86, 114, 29);

      /* Background image with contain */
      background-image: url('lavo_pic_1.jpeg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      background-color: #ffffff;

      padding-bottom: 360px; /* tweak this to move text up/down */
    }

    .hero h1 {
      font-size: 32px;
      margin: 0;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 24px;
      }
      .hero {
        padding-bottom: 80px; /* less space on tablets */
      }
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 20px;
      }
      .hero {
        padding-bottom: 60px; /* less space on phones */
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Lavo Land</div>
    <div class="links">
      <a href="#">Button Name 1</a>
      <a href="#">Button Name 2</a>
      <a href="#">Button Name 3</a>
      <a href="#">Button Name 4</a>
    </div>
  </nav>
  
  <section class="hero">
    <h1><strong>Love of avocados</strong></h1>
  </section>
</body>
</html>
