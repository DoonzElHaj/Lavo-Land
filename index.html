<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancer Model Aviation - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: rgb(255, 255, 255);
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(67, 134, 43);
      padding: 15px 30px;
    }

    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px; /* space between logo and button */
    }

    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 40px 20px; /* reduced padding so logo sits higher */
      background: linear-gradient(to bottom, rgb(88, 178, 56), rgb(4, 53, 10));
      color: white;
      min-height: 100vh; /* fills the full screen height */
      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* pushes content higher */
    }

    .hero h1 {
      font-size: 64px;   /* slightly bigger logo text */
      margin-top: 20px;  /* controls how high it sits */
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .hero .buttons a button {
      background-color: white;
      color: rgb(67, 134, 43);
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin: 10px;
    }

    .hero .buttons a button:hover {
      background-color: rgb(220, 220, 220);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Lavo Land</div>
    <div class="links">
      <a href="#">Button Name 1</a>
      <a href="#">Button Name 2</a>
      <a href="#">Button Name 3</a>
      <a href="#">Button Name 4</a>
    </div>
  </nav>
  
  <section class="hero">
    <h1>Lavo Land</h1>
    <p>~ Insert description here ~</p>
    <div class="buttons">
      <a href="#"><button>Button 1</button></a>
      <a href="#"><button>Button 2</button></a>
    </div>
  </section>
</body>
</html>
